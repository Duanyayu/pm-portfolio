name: Build & Deploy Portfolio

on:
  push:
    branches: [master]
    paths:
      - 'deliverables/career-transition/**'
      - 'model_for_md/css/**'
      - 'model_for_md/js/**'
      - 'scripts/build-portfolio.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build HTML pages
        run: node scripts/build-portfolio.js

      - name: Generate PDFs
        run: |
          npm install puppeteer
          node scripts/build-portfolio.js --pdf
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: model_for_md

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
