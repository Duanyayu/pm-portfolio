<html lang="zh-CN">
<head>

    <style>
/* ============================================================
   Mars 5 Ultra 散热优化专项 - 项目仪表盘 样式
   ============================================================ */

:root {
  --bg-primary: #0d1117;
  --bg-card: #161b22;
  --bg-input: #21262d;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text-primary: #c9d1d9;
  --text-secondary: #8b949e;
  --accent: #58a6ff;
  --accent-badge: #1f6feb;
  --success: #238636;
  --warning: #d2991b;
  --danger: #f85149;
  --info: #79c0ff;
  --radius: 12px;
  --radius-sm: 6px;
  --shadow: 0 0 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
  padding: 24px;
  line-height: 1.5;
}

.dashboard {
  max-width: 1280px;
  margin: 0 auto;
}

/* ---- Tab Navigation ---- */
.tab-nav {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}

.tab-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}

.tab-btn:hover { color: var(--text-primary); }

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ---- Grid Layouts ---- */
.grid-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.grid-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.grid-full { grid-column: 1 / -1; }

/* ---- Cards ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.card-header h2 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
}

.card-header h3 {
  font-size: 15px;
  color: var(--text-secondary);
}

/* ---- Badges ---- */
.badge {
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.badge-active { background: var(--accent-badge); color: #fff; }
.badge-success { background: var(--success); color: #fff; }
.badge-warning { background: var(--warning); color: #000; }
.badge-danger { background: var(--danger); color: #fff; }

/* ---- Progress Bar ---- */
.progress-bar {
  background: var(--bg-input);
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  margin: 12px 0;
}

.progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.progress-fill.warning { background: var(--warning); }
.progress-fill.danger { background: var(--danger); }

/* ---- Milestone Timeline ---- */
.milestone-timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.milestone {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}

.milestone-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
}

.milestone-dot.active {
  background: var(--warning);
  box-shadow: 0 0 8px var(--warning);
}

.milestone-dot.done { background: var(--success); }

.milestone-label { font-size: 14px; }
.milestone-date { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }

/* ---- Kanban ---- */
.kanban-board {
  display: flex;
  gap: 12px;
  min-height: 300px;
  overflow-x: auto;
}

.kanban-col {
  flex: 1;
  min-width: 180px;
  background: var(--bg-primary);
  border-radius: 8px;
  padding: 12px;
}

.kanban-col h3 {
  font-size: 13px;
  margin-bottom: 10px;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
}

.kanban-col .count {
  background: var(--bg-input);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.kanban-col.drag-over {
  outline: 2px dashed var(--accent);
  outline-offset: -2px;
}

.task-card {
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 13px;
  border-left: 3px solid var(--border);
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s;
}

.task-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.task-card.dragging {
  opacity: 0.5;
  transform: rotate(2deg);
}

.task-card .func-tag {
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 6px;
  background: var(--accent-badge);
  color: #fff;
}

.task-card .func-tag.structure { background: #7c3aed; }
.task-card .func-tag.hardware { background: #db2777; }
.task-card .func-tag.firmware { background: #0891b2; }
.task-card .func-tag.testing { background: #65a30d; }
.task-card .func-tag.supply { background: #d97706; }

/* ---- Risk Matrix (5x5 Grid) ---- */
.risk-matrix-grid {
  display: grid;
  grid-template-columns: 60px repeat(5, 1fr);
  grid-template-rows: auto repeat(5, 60px);
  gap: 2px;
  font-size: 12px;
}

.risk-matrix-cell {
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.risk-matrix-label {
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
}

.risk-bubble {
  position: absolute;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 11px;
  color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
}

.risk-bubble:hover { transform: scale(1.3); z-index: 10; }

/* ---- Workload Table ---- */
.workload-table {
  width: 100%;
  font-size: 13px;
  border-collapse: collapse;
}

.workload-table th, .workload-table td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--bg-input);
}

.workload-table th { color: var(--text-secondary); font-weight: 500; }

.workload-bar-bg {
  background: var(--bg-input);
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  width: 100px;
}

.workload-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}

.wl-ok { background: var(--success); }
.wl-warn { background: var(--warning); }
.wl-over { background: var(--danger); }

/* ---- Sprint Calendar ---- */
.sprint-timeline {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sprint-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
}

.sprint-name { width: 80px; font-weight: 600; flex-shrink: 0; }

.sprint-bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg-input);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
}

.sprint-bar-fill {
  height: 100%;
  border-radius: 4px;
  position: absolute;
  opacity: 0.7;
}

.sprint-bar-fill.current { background: var(--accent-badge); opacity: 1; }
.sprint-bar-fill.done { background: var(--success); }
.sprint-bar-fill.upcoming { background: var(--bg-input); border: 1px dashed var(--border); }

.sprint-milestone {
  position: absolute;
  top: 2px;
  width: 2px;
  height: 20px;
  background: var(--warning);
  z-index: 2;
}

/* ---- Sync Log ---- */
.sync-entry {
  background: var(--bg-primary);
  border-left: 3px solid var(--accent);
  padding: 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  font-size: 13px;
  line-height: 1.6;
}

.sync-entry .sync-meta {
  display: flex;
  gap: 16px;
  margin-bottom: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.sync-entry strong { color: var(--text-primary); }
.sync-entry .action-item { color: var(--warning); }

.sync-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.sync-filter-btn {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.sync-filter-btn.active {
  background: var(--accent-badge);
  color: #fff;
  border-color: var(--accent-badge);
}

/* ---- Decisions Alert ---- */
.decisions-banner {
  background: linear-gradient(135deg, #3d2200, #5c3d00);
  border: 1px solid var(--warning);
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.decisions-banner .icon { font-size: 20px; flex-shrink: 0; }

.decisions-banner .content { flex: 1; }

.decisions-banner .title {
  font-weight: 600;
  color: var(--warning);
  margin-bottom: 4px;
}

.decisions-banner .deadline {
  font-size: 12px;
  color: var(--text-secondary);
}

.decisions-banner .dismiss {
  background: none;
  border: none;
  color: var(--warning);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
}

.decision-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 13px;
}

.decision-item .options {
  font-size: 12px;
  color: var(--text-secondary);
}

.decision-countdown { font-size: 11px; color: var(--danger); white-space: nowrap; }

/* ---- Burndown Chart ---- */
.burndown-container {
  position: relative;
  width: 100%;
}

.burndown-container svg {
  width: 100%;
  height: auto;
}

.burndown-legend {
  display: flex;
  gap: 20px;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.burndown-legend span { display: flex; align-items: center; gap: 6px; }

.burndown-legend .line { width: 20px; height: 2px; border-radius: 1px; }

/* ---- Top Bar ---- */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.top-bar-left h1 { font-size: 24px; font-weight: 700; }

.top-bar-left .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.live-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.live-toggle input[type="checkbox"] {
  width: 36px; height: 20px;
  appearance: none;
  background: var(--bg-input);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}

.live-toggle input[type="checkbox"]::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text-secondary);
  top: 2px; left: 2px;
  transition: all 0.2s;
}

.live-toggle input[type="checkbox"]:checked {
  background: var(--success);
}

.live-toggle input[type="checkbox"]:checked::after {
  left: 18px;
  background: #fff;
}

/* ---- Modal ---- */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 480px;
  width: 90%;
}

.modal-content h3 { color: var(--accent); margin-bottom: 12px; }
.modal-content p { font-size: 13px; margin-bottom: 8px; }
.modal-close {
  background: var(--accent-badge);
  color: #fff;
  border: none;
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-top: 12px;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ---- Responsive ---- */
@media (max-width: 900px) {
  .grid-2col, .grid-3col { grid-template-columns: 1fr; }
  .kanban-board { flex-direction: column; }
  .tab-btn { padding: 8px 12px; font-size: 12px; }
}
    </style>
</head>

      <div id="sync-log-container"></div>

  </div>

</div>

    <script>
/**
 * decisions.js — "待决策"提醒横幅
 * 在仪表盘顶部展示需要产品经理决策的事项、截止倒计时
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.Decisions = {
    init: function(containerId) {
      this.container = document.getElementById(containerId);
      if (!this.container) return;
      this._dismissed = JSON.parse(localStorage.getItem('dashboard-dismissed-decisions') || '[]');
      this.render();
    },

    render: function() {
      var decisions = Data.getDecisions();
      var self = this;
      var activeDecisions = decisions.filter(function(d) {
        return self._dismissed.indexOf(d.id) === -1;
      });

      this.container.innerHTML = '';

      if (activeDecisions.length === 0) {
        this.container.innerHTML = '<div style="font-size:13px;color:#8b949e;">暂无待决策事项。</div>';
        return;
      }

      activeDecisions.forEach(function(decision) {
        var banner = document.createElement('div');
        banner.className = 'decisions-banner';

        // Countdown
        var daysLeft = self._daysUntil(decision.deadline);
        var countdownText = daysLeft < 0 ? '已逾期' : daysLeft === 0 ? '今天截止' : daysLeft + ' 天剩余';
        var countdownColor = daysLeft < 0 ? '#f85149' : daysLeft <= 2 ? '#f85149' : daysLeft <= 5 ? '#d2991b' : '#8b949e';

        banner.innerHTML =
          '<div class="icon">⚠️</div>' +
          '<div class="content">' +
          '<div class="title">待决策: ' + decision.title + '</div>' +
          '<div style="font-size:13px;margin-bottom:6px;">' + decision.context + '</div>' +
          decision.options.map(function(o) { return '<div class="decision-item">• ' + o + '</div>'; }).join('') +
          '<div style="margin-top:6px;font-size:12px;">' +
          '<strong>推荐:</strong> ' + decision.recommendation +
          ' | <strong>负责人:</strong> ' + decision.owner +
          ' | <span style="color:' + countdownColor + ';">截止: ' + decision.deadline + ' (' + countdownText + ')</span>' +
          '</div></div>' +
          '<button class="dismiss" title="暂时关闭">✕</button>';

        banner.querySelector('.dismiss').addEventListener('click', function() {
          self._dismissed.push(decision.id);
          localStorage.setItem('dashboard-dismissed-decisions', JSON.stringify(self._dismissed));
          banner.remove();
          if (self.container.querySelectorAll('.decisions-banner').length === 0) {
            self.container.innerHTML = '<div style="font-size:13px;color:#8b949e;">所有决策已处理。</div>';
          }
        });

        self.container.appendChild(banner);
      });
    },

    _daysUntil: function(dateStr) {
      var now = new Date();
      var deadline = new Date(dateStr);
      return Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));
    }
  };
})(window);

    <script>
/**
 * burndown.js — SVG 燃尽图（理想 vs 实际）
 * 展示 Sprint 内剩余 Story Points 的变化趋势
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.Burndown = {
    init: function(containerId) {
      this.container = document.getElementById(containerId);
      if (!this.container) return;
      this._renderSprintSelector();
      this.render('S2'); // 默认显示当前 Sprint
    },

    _renderSprintSelector: function() {
      var self = this;
      var sprints = Data.getSprints();
      var sel = document.createElement('select');
      sel.id = 'burndown-sprint-select';
      sel.style.cssText = 'background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px 8px;border-radius:4px;margin-bottom:12px;font-size:13px;';
      sprints.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name + ' (' + s.start + ' ~ ' + s.end + ')';
        if (s.status === 'current') opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function() { self.render(this.value); });
      this.container.appendChild(sel);

      this.chartDiv = document.createElement('div');
      this.chartDiv.className = 'burndown-container';
      this.container.appendChild(this.chartDiv);

      this.legendDiv = document.createElement('div');
      this.legendDiv.className = 'burndown-legend';
      this.legendDiv.innerHTML =
        '<span><span class="line" style="background:#8b949e;border:1px dashed #8b949e;"></span>理想线</span>' +
        '<span><span class="line" style="background:#58a6ff;"></span>实际线</span>';
      this.container.appendChild(this.legendDiv);
    },

    render: function(sprintId) {
      var bd = Data.getBurndown();
      var sprintData = bd.sprints[sprintId];
      if (!sprintData) return;

      var ideal = sprintData.ideal;
      var actual = sprintData.actual;
      var total = sprintData.totalPoints;
      var days = ideal.length;

      var W = 600, H = 260;
      var pad = { top: 20, right: 20, bottom: 30, left: 45 };
      var plotW = W - pad.left - pad.right;
      var plotH = H - pad.top - pad.bottom;

      var svgNS = 'http://www.w3.org/2000/svg';
      var svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', H);

      // Grid lines
      for (var i = 0; i <= 5; i++) {
        var y = pad.top + (plotH / 5) * i;
        var line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', pad.left);
        line.setAttribute('y1', y);
        line.setAttribute('x2', W - pad.right);
        line.setAttribute('y2', y);
        line.setAttribute('stroke', '#21262d');
        line.setAttribute('stroke-width', '1');
        svg.appendChild(line);

        var label = document.createElementNS(svgNS, 'text');
        label.setAttribute('x', pad.left - 8);
        label.setAttribute('y', y + 4);
        label.setAttribute('text-anchor', 'end');
        label.setAttribute('fill', '#8b949e');
        label.setAttribute('font-size', '11');
        label.textContent = Math.round(total * (1 - i / 5));
        svg.appendChild(label);
      }

      // X axis labels
      for (var d = 0; d < days; d++) {
        var x = pad.left + (plotW / (days - 1)) * d;
        var tick = document.createElementNS(svgNS, 'line');
        tick.setAttribute('x1', x); tick.setAttribute('y1', pad.top + plotH);
        tick.setAttribute('x2', x); tick.setAttribute('y2', pad.top + plotH + 5);
        tick.setAttribute('stroke', '#30363d'); tick.setAttribute('stroke-width', '1');
        svg.appendChild(tick);

        var dl = document.createElementNS(svgNS, 'text');
        dl.setAttribute('x', x);
        dl.setAttribute('y', pad.top + plotH + 18);
        dl.setAttribute('text-anchor', 'middle');
        dl.setAttribute('fill', '#8b949e');
        dl.setAttribute('font-size', '10');
        dl.textContent = 'D' + (d + 1);
        svg.appendChild(dl);
      }

      // Ideal line
      var idealPath = this._buildPath(ideal, total, pad, plotW, plotH, days);
      var idealLine = document.createElementNS(svgNS, 'path');
      idealLine.setAttribute('d', idealPath);
      idealLine.setAttribute('fill', 'none');
      idealLine.setAttribute('stroke', '#8b949e');
      idealLine.setAttribute('stroke-width', '2');
      idealLine.setAttribute('stroke-dasharray', '6,3');
      svg.appendChild(idealLine);

      // Actual line
      var actualPath = this._buildPath(actual, total, pad, plotW, plotH, days);
      var actualLine = document.createElementNS(svgNS, 'path');
      actualLine.setAttribute('d', actualPath);
      actualLine.setAttribute('fill', 'none');
      actualLine.setAttribute('stroke', '#58a6ff');
      actualLine.setAttribute('stroke-width', '2.5');
      svg.appendChild(actualLine);

      // Data points on actual line
      for (var p = 0; p < days; p++) {
        if (actual[p] === 0 && p > 0 && actual[p-1] === 0) continue;
        var px = pad.left + (plotW / (days - 1)) * p;
        var py = pad.top + plotH * (1 - actual[p] / total);

        var dot = document.createElementNS(svgNS, 'circle');
        dot.setAttribute('cx', px); dot.setAttribute('cy', py);
        dot.setAttribute('r', '3.5');
        dot.setAttribute('fill', '#58a6ff');
        svg.appendChild(dot);

        // Tooltip on hover
        dot.style.cursor = 'pointer';
        dot.addEventListener('mouseenter', (function(x, y, val, day) {
          return function() { global.Dashboard.Burndown._showTooltip(x, y, val, day); };
        })(px, py, actual[p], p + 1));

        dot.addEventListener('mouseleave', function() {
          global.Dashboard.Burndown._hideTooltip();
        });
      }

      this.chartDiv.innerHTML = '';
      this.chartDiv.appendChild(svg);
    },

    _buildPath: function(data, total, pad, plotW, plotH, days) {
      var path = '';
      for (var i = 0; i < days; i++) {
        var x = pad.left + (plotW / (days - 1)) * i;
        var y = pad.top + plotH * (1 - data[i] / total);
        path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      }
      return path;
    },

    _showTooltip: function(x, y, value, day) {
      var tip = document.getElementById('burndown-tooltip');
      if (!tip) {
        tip = document.createElement('div');
        tip.id = 'burndown-tooltip';
        tip.style.cssText = 'position:absolute;background:#161b22;border:1px solid #30363d;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;z-index:100;color:#c9d1d9;';
        document.body.appendChild(tip);
      }
      tip.innerHTML = '<strong>Day ' + day + '</strong><br>剩余: ' + value + ' points';
      tip.style.left = (x + 350) + 'px';
      tip.style.top = (y + 100) + 'px';
      tip.style.display = 'block';
    },

    _hideTooltip: function() {
      var tip = document.getElementById('burndown-tooltip');
      if (tip) tip.style.display = 'none';
    }
  };
})(window);
    </script>
    <script>
/**
 * kanban.js — 拖拽看板 (HTML5 Drag & Drop API)
 * 支持卡片在列间拖动，数据持久化到 localStorage
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.Kanban = {
    init: function(containerId) {
      this.container = document.getElementById(containerId);
      if (!this.container) return;
      this.render();
    },

    render: function() {
      var self = this;
      var kanban = Data.getKanban();
      this.container.innerHTML = '';

      var board = document.createElement('div');
      board.className = 'kanban-board';

      kanban.columns.forEach(function(col) {
        var colEl = document.createElement('div');
        colEl.className = 'kanban-col';
        colEl.dataset.colId = col.id;

        var count = col.items.length;
        colEl.innerHTML = '<h3>' + col.name + ' <span class="count">' + count + '</span></h3>';

        col.items.forEach(function(item) {
          var card = document.createElement('div');
          card.className = 'task-card';
          card.draggable = true;
          card.dataset.itemId = item.id;
          card.innerHTML = '<span class="func-tag ' + (item.funcClass || '') + '">' + item.func + '</span>' + item.title;

          // Drag events
          card.addEventListener('dragstart', function(e) {
            card.classList.add('dragging');
            e.dataTransfer.setData('text/plain', JSON.stringify({ itemId: item.id, fromCol: col.id }));
            e.dataTransfer.effectAllowed = 'move';
          });

          card.addEventListener('dragend', function(e) {
            card.classList.remove('dragging');
            board.querySelectorAll('.kanban-col').forEach(function(c) { c.classList.remove('drag-over'); });
          });

          colEl.appendChild(card);
        });

        // Drop events on column
        colEl.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          colEl.classList.add('drag-over');
        });

        colEl.addEventListener('dragleave', function(e) {
          colEl.classList.remove('drag-over');
        });

        colEl.addEventListener('drop', function(e) {
          e.preventDefault();
          colEl.classList.remove('drag-over');
          var data = JSON.parse(e.dataTransfer.getData('text/plain'));
          if (data.fromCol !== col.id) {
            self._moveItem(data.itemId, data.fromCol, col.id);
          }
        });

        board.appendChild(colEl);
      });

      this.container.appendChild(board);
    },

    _moveItem: function(itemId, fromColId, toColId) {
      var kanban = Data.getKanban();
      var fromCol = kanban.columns.find(function(c) { return c.id === fromColId; });
      var toCol = kanban.columns.find(function(c) { return c.id === toColId; });
      if (!fromCol || !toCol) return;

      var idx = fromCol.items.findIndex(function(i) { return i.id === itemId; });
      if (idx === -1) return;

      var item = fromCol.items.splice(idx, 1)[0];
      toCol.items.push(item);

      Data.updateKanban(kanban.columns);
      this.render();

      // 通知其他模块数据变化
      if (global.Dashboard.emit) {
        global.Dashboard.emit('kanbanChanged', { item: item, from: fromColId, to: toColId });
      }

      // 持久化到 localStorage
      try {
        localStorage.setItem('dashboard-kanban', JSON.stringify(kanban.columns));
      } catch(e) {}
    }
  };
})(window);
    </script>

/**
 * risk-matrix.js — 5×5 概率×影响 风险矩阵热力图
 * X 轴：影响程度 (1-5)，Y 轴：发生概率 (1-5)
 * 气泡位置 = (影响, 概率)，气泡大小 = 严重程度
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.RiskMatrix = {
    init: function(containerId) {
      this.container = document.getElementById(containerId);
      if (!this.container) return;
      this.render();
    },

    render: function() {
      var risks = Data.getRisks();
      var self = this;
      this.container.innerHTML = '';

      // Color scale for cells (green → yellow → red)
      var colors = [
        ['#0d3320', '#1a4a2e', '#1f5a35', '#2d6b3f', '#3a7d4a'],
        ['#2a4a1a', '#3d5a25', '#5a6b30', '#7a7d3a', '#9a8f45'],
        ['#4a4a0a', '#6b5a15', '#8a6a20', '#a87a2a', '#c48a35'],
        ['#4a2a0a', '#6b3515', '#8a4020', '#a84b2a', '#c45635'],
        ['#4a0a0a', '#6b1515', '#8a2020', '#a82a2a', '#c43535']
      ];

      // Main grid
      var grid = document.createElement('div');
      grid.className = 'risk-matrix-grid';
      grid.style.cssText = 'display:grid;grid-template-columns:80px repeat(5,1fr);grid-template-rows:auto repeat(5,70px);gap:3px;font-size:12px;';

      // Corner cell
      grid.appendChild(this._cell('', '#161b22', 'corner'));

      // Impact header (X axis)
      for (var imp = 1; imp <= 5; imp++) {
        grid.appendChild(this._cell('影响 ' + imp, '#161b22', 'header', '#8b949e'));
      }

      // Rows (Probability from 5 (top) to 1 (bottom))

/**
 * calendar.js — Sprint 发布日历
 * Gantt 风格时间线，展示各 Sprint 的起止日期和里程碑
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.Calendar = {
    init: function(containerId) {
      this.container = document.getElementById(containerId);
      if (!this.container) return;
      this.render();
    },

    render: function() {
      var sprints = Data.getSprints();
      var milestones = Data.getMilestones();
      this.container.innerHTML = '';

      // Calculate date range
      var allStart = sprints[0].start;
      var allEnd = sprints[sprints.length - 1].end;
      var totalDays = this._daysBetween(allStart, allEnd);

      var timeline = document.createElement('div');
      timeline.className = 'sprint-timeline';

      // Month header
      var monthHeader = document.createElement('div');
      monthHeader.style.cssText = 'display:flex;align-items:center;gap:12px;font-size:11px;color:#8b949e;margin-bottom:8px;padding-left:92px;';
      monthHeader.innerHTML = '<span>4月</span><span style="margin-left:auto;">5月</span><span style="margin-right:20px;">6月</span>';
      timeline.appendChild(monthHeader);

      sprints.forEach(function(sprint) {
        var row = document.createElement('div');
        row.className = 'sprint-row';

        var nameEl = document.createElement('div');
        nameEl.className = 'sprint-name';
        nameEl.innerHTML = sprint.name + '<br><span style="font-size:11px;color:#8b949e;font-weight:400;">' + sprint.start + '</span>';
        row.appendChild(nameEl);

        var track = document.createElement('div');
        track.className = 'sprint-bar-track';

        var startOffset = global.Dashboard.Calendar._daysBetween(allStart, sprint.start);
        var sprintDays = global.Dashboard.Calendar._daysBetween(sprint.start, sprint.end);
        var leftPct = (startOffset / totalDays) * 100;
        var widthPct = (sprintDays / totalDays) * 100;

        var bar = document.createElement('div');
        bar.className = 'sprint-bar-fill ' + sprint.status;
        bar.style.cssText = 'left:' + leftPct + '%;width:' + widthPct + '%;';
        bar.textContent = sprint.goal;
        bar.style.cssText += 'display:flex;align-items:center;padding-left:8px;font-size:11px;overflow:hidden;white-space:nowrap;';
        track.appendChild(bar);

        // Milestone markers on this sprint
        milestones.forEach(function(ms) {
          var msDate = ms.date;
          var msOffset = global.Dashboard.Calendar._daysBetween(allStart, msDate);
          if (msOffset < 0 || msOffset > totalDays) return;
          var msLeftPct = (msOffset / totalDays) * 100;
          var marker = document.createElement('div');
          marker.className = 'sprint-milestone';
          marker.style.left = msLeftPct + '%';
          marker.title = ms.name + ' (' + ms.date + ')';
          if (ms.status === 'done') marker.style.background = '#238636';
          if (ms.status === 'active') marker.style.background = '#d2991b';
          track.appendChild(marker);
        });

        row.appendChild(track);
        timeline.appendChild(row);
      });

      this.container.appendChild(timeline);

      // Legend
      var legend = document.createElement('div');
      legend.style.cssText = 'display:flex;gap:16px;margin-top:12px;font-size:11px;color:#8b949e;';
      legend.innerHTML =
        '<span><span style="display:inline-block;width:12px;height:12px;background:#238636;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>已完成</span>' +
        '<span><span style="display:inline-block;width:12px;height:12px;background:#1f6feb;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>当前 Sprint</span>' +
        '<span><span style="display:inline-block;width:12px;height:12px;border:1px dashed #30363d;border-radius:2px;margin-right:4px;vertical-align:middle;"></span>即将到来</span>' +
        '<span><span style="display:inline-block;width:2px;height:12px;background:#d2991b;margin-right:4px;vertical-align:middle;"></span>里程碑</span>';
      this.container.appendChild(legend);
    },

    _daysBetween: function(d1, d2) {
      return Math.round((new Date(d2) - new Date(d1)) / (1000 * 60 * 60 * 24));
    }
  };
})(window);
    </script>

    <script>
/**
 * jira-connector.js — Jira Cloud REST API 连接器（可选）
 * 默认关闭。启用时从 Jira 拉取实时数据，失败则回退模拟数据。
 *
 * 重要限制：Jira Cloud API 不支持浏览器 CORS 跨域请求。
 * 从 file:// 或 localhost 打开的页面无法直接调用 Jira API。
 * 要启用实时数据，需要通过本地 HTTP 代理转发请求。
 *
 * 用法：
 *   1. 在 data.js 中设置 jira.baseUrl（如 https://your-domain.atlassian.net）
 *   2. 打开页面后切换"Jira 实时"开关
 *   3. 输入邮箱和 API Token（仅存 sessionStorage，关闭即清除）
 */
(function(global) {
  global.Dashboard = global.Dashboard || {};
  var Data = global.Dashboard.Data;

  global.Dashboard.JiraConnector = {

    _getAuth: function() {
      var auth = sessionStorage.getItem('jira-auth');
      if (auth) return JSON.parse(auth);
      return null;
    },

    _promptAuth: function() {
      var email = prompt('Jira Cloud 登录邮箱:');
      if (!email) return null;
      var token = prompt('Jira API Token\n(在 https://id.atlassian.com/manage-profile/security/api-tokens 创建):');
      if (!token) return null;
      var auth = { email: email, token: token };
      sessionStorage.setItem('jira-auth', JSON.stringify(auth));
      return auth;
    },

    _fetch: function(endpoint) {
      var config = Data.getJiraConfig();
      var baseUrl = config.baseUrl.replace(/\/$/, '');

      // Pre-check: empty or placeholder URL
      if (!baseUrl || baseUrl === 'https://your-domain.atlassian.net') {
        return Promise.reject(new Error('URL_NOT_CONFIGURED'));
      }

      var auth = this._getAuth();
      if (!auth) {
        auth = this._promptAuth();
        if (!auth) return Promise.reject(new Error('AUTH_CANCELLED'));
      }

      var headers = new Headers();
      headers.set('Authorization', 'Basic ' + btoa(auth.email + ':' + auth.token));
      headers.set('Accept', 'application/json');

      // Direct browser requests from file:// to Jira Cloud WILL fail due to CORS.
      // Jira Cloud does NOT return Access-Control-Allow-Origin headers.
      // Workaround: serve dashboard via local HTTP proxy, see docs/jira/jira-api-setup-guide.md
      return fetch(baseUrl + endpoint, { headers: headers })
        .then(function(res) {
          if (!res.ok) {
            if (res.status === 401) {
              sessionStorage.removeItem('jira-auth');
              throw new Error('AUTH_FAILED');
            }
            throw new Error('HTTP_' + res.status);
          }
          return res.json();
        })
        .catch(function(err) {
          // Re-throw typed errors as-is
          if (err.message === 'AUTH_FAILED' || err.message === 'AUTH_CANCELLED' ||
              err.message === 'URL_NOT_CONFIGURED' || err.message.indexOf('HTTP_') === 0) {
            throw err;
          }
          // All other errors (CORS, network, DNS) → uniform type
          throw new Error('CORS_OR_NETWORK');
        });
    },

    /**
     * 尝试从 Jira 获取项目 Issues
     */
    fetchIssues: function() {
      var config = Data.getJiraConfig();
      var endpoint = '/rest/api/3/search?jql=project%3D' + encodeURIComponent(config.projectKey) + '&maxResults=50';
      console.log('[Jira] Connecting to ' + config.baseUrl + ' ...');

      return this._fetch(endpoint)
        .then(function(data) {
          console.log('[Jira] Connected! Got ' + data.issues.length + ' issues.');
          return { success: true, count: data.issues.length };
        })
        .catch(function(err) {
          console.warn('[Jira] Connection failed: ' + err.message);
          return { success: false, error: err.message };
        });
    },

    /**
     * 测试 Jira 连接是否可用
     */
    testConnection: function() {
      return this._fetch('/rest/api/3/myself')
        .then(function(user) {
          return { success: true, user: user.displayName };
        })
        .catch(function(err) {
          return { success: false, error: err.message };
        });
    }
  };
})(window);
    </script>

/**
 * dashboard.js — 主控脚本
 * 标签页导航、事件总线、模块初始化
 */
(function(global) {
  var D = global.Dashboard;

  // ---- Event Bus ----
  var listeners = {};

  D.on = function(event, callback) {
    if (!listeners[event]) listeners[event] = [];
    listeners[event].push(callback);
  };

  D.emit = function(event, data) {
    (listeners[event] || []).forEach(function(cb) { cb(data); });
  };

  // ---- Tab Navigation ----
  function initTabs() {
    var tabs = document.querySelectorAll('.tab-btn');
    var contents = document.querySelectorAll('.tab-content');

    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        tabs.forEach(function(t) { t.classList.remove('active'); });
        contents.forEach(function(c) { c.classList.remove('active'); });
        tab.classList.add('active');
        var target = document.getElementById(tab.dataset.tab);
        if (target) target.classList.add('active');

        // Re-render certain views on tab switch (to handle any state changes)
        if (tab.dataset.tab === 'tab-kanban' && D.Kanban && D.Kanban.render) {
          D.Kanban.render();
        }
        if (tab.dataset.tab === 'tab-sync' && D.SyncLog && D.SyncLog.render) {
          D.SyncLog.render();
        }
      });
    });
  }

  // ---- Jira Live Toggle ----
  function initJiraToggle() {
    var toggle = document.getElementById('jira-live-toggle');
    var statusEl = document.getElementById('jira-status');
    if (!toggle || !statusEl) return;

    toggle.addEventListener('change', function() {
      if (this.checked) {
        statusEl.textContent = '连接中...';
        statusEl.style.color = '#d2991b';

        D.JiraConnector.testConnection().then(function(result) {
          if (result.success) {
            statusEl.textContent = '实时数据 (' + result.user + ')';
            statusEl.style.color = '#238636';
            D.JiraConnector.fetchIssues();
            return;
          }

          // Specific error messages
          var errMsg;
          switch (result.error) {
            case 'URL_NOT_CONFIGURED':
              errMsg = '请先在 data.js 中配置 jira.baseUrl';
              break;
            case 'CORS_OR_NETWORK':
              errMsg = '浏览器 CORS 限制 (需本地代理)';
              break;
            case 'AUTH_FAILED':
              errMsg = '认证失败，请检查邮箱和 Token';
              break;
            case 'AUTH_CANCELLED':
              errMsg = '已取消认证';
              break;
            default:
              errMsg = '连接失败: ' + (result.error || '未知错误');
          }
          statusEl.textContent = errMsg;
          statusEl.style.color = '#f85149';
          statusEl.style.cursor = 'pointer';
          statusEl.title = '点击查看详情';
          statusEl.onclick = function() {
            var tips = {
              'URL_NOT_CONFIGURED': '需要配置 Jira Cloud 地址。\n\n打开 dashboard/js/data.js，\n找到 jira 配置块，\n将 baseUrl 改为你的 Jira 地址\n(如 https://your-company.atlassian.net)',
              'CORS_OR_NETWORK': '这是浏览器安全策略限制，不是你的配置问题。\n\nJira Cloud 不允许从本地 HTML 文件\n直接调用其 API。\n\n解决方案：需要启动一个本地 HTTP 代理\n将请求转发到 Jira。\n详见 docs/jira/jira-api-setup-guide.md\n\n当前将使用模拟数据运行。',
              'AUTH_FAILED': 'API Token 可能已过期或邮箱不匹配。\n请重新生成 Token:\nhttps://id.atlassian.com/manage-profile/security/api-tokens'
            }[result.error];
            if (tips) alert(tips);
          };
          toggle.checked = false;
        });
      } else {
        statusEl.textContent = '模拟数据';
        statusEl.style.color = '#8b949e';
        statusEl.style.cursor = 'default';
        statusEl.onclick = null;
      }
    });
  }

  // ---- Init All ----
  document.addEventListener('DOMContentLoaded', function() {
    initTabs();
    initJiraToggle();

    // Initialize all modules
    if (D.Burndown && D.Burndown.init)     D.Burndown.init('burndown-container');
    if (D.Kanban && D.Kanban.init)          D.Kanban.init('kanban-container');
    if (D.RiskMatrix && D.RiskMatrix.init)  D.RiskMatrix.init('risk-matrix-container');
    if (D.Workload && D.Workload.init)      D.Workload.init('workload-container');
    if (D.Calendar && D.Calendar.init)      D.Calendar.init('calendar-container');
    if (D.SyncLog && D.SyncLog.init)        D.SyncLog.init('sync-log-container');
    if (D.Decisions && D.Decisions.init)    D.Decisions.init('decisions-container');

    // Render milestones in overview tab
    renderMilestones();
    renderProjectStatus();

    // Listen for kanban changes to update counts
    D.on('kanbanChanged', function() {
      renderMilestones();
    });
  });

  // ---- Render Milestones (Overview Tab) ----
  function renderMilestones() {
    var container = document.getElementById('milestone-container');
    if (!container) return;

    var milestones = D.Data.getMilestones();
    var project = D.Data.getProject();

    var html = '<div class="progress-bar"><div class="progress-fill" style="width:' + project.progress + '%;"></div></div>';
    html += '<div class="milestone-timeline">';

    var statusIcon = { done: '✅', active: '🟡', pending: '⚪' };
    var dotClass = { done: 'done', active: 'active', pending: '' };

    milestones.forEach(function(ms) {
      html += '<div class="milestone">' +
        '<span class="milestone-dot ' + (dotClass[ms.status] || '') + '"></span>' +
        '<span class="milestone-label">' + (statusIcon[ms.status] || '') + ' ' + ms.name + '</span>' +
        '<span class="milestone-date">(' + ms.date + ')</span>' +
        '</div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }

  function renderProjectStatus() {
    var container = document.getElementById('project-status');
    if (!container) return;
    var project = D.Data.getProject();
    container.innerHTML =
      '<span class="badge badge-active">进行中</span>' +
      '<div style="font-size:12px;color:#8b949e;margin-top:8px;">最后更新：' + project.lastUpdated + '</div>';
  }

})(window);
    </script>

</body>
